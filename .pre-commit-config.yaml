repos:
  - repo: local
    hooks:
      - id: ruff-check-fix
        name: ruff check fix
        entry: docker compose run --rm --no-deps backend ruff check . --fix
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format
        entry: docker compose run --rm --no-deps backend ruff format .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-cleanup
        name: frontend cleanup
        entry: docker compose run --rm --no-deps frontend yarn cleanup
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-check
        name: ruff check
        entry: docker compose run --rm --no-deps backend ruff check .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ruff-format-check
        name: ruff format check
        entry: docker compose run --rm --no-deps backend ruff format . --check
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-check
        name: frontend check
        entry: docker compose run --rm --no-deps frontend yarn check
        language: system
        pass_filenames: false
        stages: [pre-push]
